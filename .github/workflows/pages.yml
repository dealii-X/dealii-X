name: Build and Publish Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt

      - name: Build Sphinx site
        run: ./scripts/build_doc.sh

      - name: Deploy site to dealii-X.github.io
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          personal_token: ${{ secrets.DEALII_X_GITHUB_IO_TOKEN }}
          external_repository: dealii-X/dealii-X.github.io
          publish_dir: ./build/docs/site
          publish_branch: main
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: "docs: publish dealii-X site from ${{ github.repository }}@${{ github.sha }}"
